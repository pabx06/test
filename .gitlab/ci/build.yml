build:
  stage: build
  image:
    name: $BUILDAH_IMAGE
    entrypoint: [""]
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_FORMAT: docker
    BUILDAH_ISOLATION: chroot
  only:
    - main
  before_script:
    - printf "%s" "$HARBOR_PASSWORD" | buildah login --username "$HARBOR_USERNAME" --password-stdin "$HARBOR_REGISTRY"
    - |
      NPMRC_PATH="${CI_PROJECT_DIR}/backend/.npmrc.example"
      : > "$NPMRC_PATH"
      if [ -n "${NPM_REGISTRY_URL:-}" ]; then
        printf "registry=%s\n" "$NPM_REGISTRY_URL" > "$NPMRC_PATH"
        if [ -n "${NPM_TOKEN:-}" ] && [ -n "${NPM_REGISTRY_AUTH_PATH:-}" ]; then
          printf "//%s:_authToken=%s\n" "$NPM_REGISTRY_AUTH_PATH" "$NPM_TOKEN" >> "$NPMRC_PATH"
          printf "always-auth=true\n" >> "$NPMRC_PATH"
        fi
        printf "strict-ssl=%s\n" "${NPM_STRICT_SSL:-true}" >> "$NPMRC_PATH"
      else
        printf "registry=https://registry.npmjs.org/\nstrict-ssl=true\n" > "$NPMRC_PATH"
      fi
  script:
    - buildah bud --layers=false --file "${CI_PROJECT_DIR}/frontend/Dockerfile" --tag "${IMAGE_FRONTEND}:${CI_COMMIT_SHORT_SHA}" "${CI_PROJECT_DIR}/frontend"
    - buildah push --digestfile frontend.digest "${IMAGE_FRONTEND}:${CI_COMMIT_SHORT_SHA}" "docker://${IMAGE_FRONTEND}:${CI_COMMIT_SHORT_SHA}"
    - buildah bud --layers=false --file "${CI_PROJECT_DIR}/backend/Dockerfile" --tag "${IMAGE_BACKEND}:${CI_COMMIT_SHORT_SHA}" "${CI_PROJECT_DIR}/backend"
    - buildah push --digestfile backend.digest "${IMAGE_BACKEND}:${CI_COMMIT_SHORT_SHA}" "docker://${IMAGE_BACKEND}:${CI_COMMIT_SHORT_SHA}"
    - FRONTEND_IMAGE_DIGEST="$(cat frontend.digest)"
    - BACKEND_IMAGE_DIGEST="$(cat backend.digest)"
    - printf "FRONTEND_IMAGE_DIGEST=%s\nBACKEND_IMAGE_DIGEST=%s\n" "$FRONTEND_IMAGE_DIGEST" "$BACKEND_IMAGE_DIGEST" > build.env
  artifacts:
    reports:
      dotenv: build.env
