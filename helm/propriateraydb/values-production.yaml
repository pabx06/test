frontend:
  replicas: 1
  image:
    repository: harbor.example.com/propriateraydb/frontend
    digest: ""
    pullPolicy: IfNotPresent
  route:
    enabled: true

backend:
  replicas: 1
  image:
    repository: harbor.example.com/propriateraydb/backend
    digest: ""
    pullPolicy: IfNotPresent
  auth:
    mode: oidc
    sessionStore: redis
  config:
    nodeEnv: production
    logLevel: info

mariadb:
  enabled: true
  persistence:
    storage: 10Gi

redis:
  enabled: true
  persistence:
    enabled: true
    storage: 1Gi
