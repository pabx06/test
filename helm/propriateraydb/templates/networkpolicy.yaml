{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "propriateraydb.fullname" . }}-frontend
  labels:
    {{- include "propriateraydb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "propriateraydb.componentLabels" (dict "component" "frontend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "propriateraydb.componentLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "propriateraydb.fullname" . }}-backend
  labels:
    {{- include "propriateraydb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "propriateraydb.componentLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "propriateraydb.componentLabels" (dict "component" "frontend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "propriateraydb.componentLabels" (dict "component" "mariadb" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mariadb.service.port }}
    {{- if .Values.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "propriateraydb.componentLabels" (dict "component" "redis" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.service.port }}
    {{- end }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "propriateraydb.fullname" . }}-mariadb
  labels:
    {{- include "propriateraydb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "propriateraydb.componentLabels" (dict "component" "mariadb" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "propriateraydb.componentLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mariadb.service.port }}
{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "propriateraydb.fullname" . }}-redis
  labels:
    {{- include "propriateraydb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "propriateraydb.componentLabels" (dict "component" "redis" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "propriateraydb.componentLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.service.port }}
{{- end }}
{{- end }}
