apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "propriateraydb.fullname" . }}-backend
  labels:
    {{- include "propriateraydb.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "propriateraydb.componentLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/backend-config: {{ include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "propriateraydb.componentLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "propriateraydb.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      containers:
        - name: backend
          image: {{ include "propriateraydb.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "propriateraydb.fullname" . }}-backend-config
            - secretRef:
                name: {{ include "propriateraydb.backendSecretName" . }}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "propriateraydb.mariadbSecretName" . }}
                  key: MYSQL_PASSWORD
            {{ if eq .Values.backend.auth.sessionStore "redis" }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "propriateraydb.redisSecretName" . }}
                  key: REDIS_PASSWORD
            {{ end }}
          {{ if .Values.backend.nas.enabled }}
          volumeMounts:
            - name: nas-xml
              mountPath: {{ .Values.backend.nas.mountPath | quote }}
              readOnly: {{ .Values.backend.nas.readOnly }}
          {{ end }}
          startupProbe:
            httpGet:
              path: {{ .Values.backend.probes.startup.path }}
              port: {{ .Values.backend.service.port }}
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.backend.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      {{ if .Values.backend.nas.enabled }}
      volumes:
        - name: nas-xml
          persistentVolumeClaim:
            claimName: {{ required "backend.nas.existingClaim is required when backend.nas.enabled=true" .Values.backend.nas.existingClaim }}
      {{ end }}
