services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: debug
      AUTH_MODE: mock
      SESSION_STORE: redis
      SESSION_SECRET: local-development-secret
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: propriateraydb
      DB_USER: propriateraydb
      DB_PASSWORD: propriateraydb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      ITK_MOCK: "true"
      PROPRIATERAYDB_MOCK: "true"
    depends_on:
      - db
      - redis
    networks:
      default:
        aliases:
          - propriateraydb-backend

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: propriateraydb
      MYSQL_USER: propriateraydb
      MYSQL_PASSWORD: propriateraydb
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data

volumes:
  db_data:
  redis_data:
